<div class="exec">
  <div class="exec-kicker">Executive summary — PM take</div>
  <div class="exec-item"><div class="exec-dot"></div><div class="exec-text"><strong>Abridge wins today</strong> on trust (Linked Evidence) and enterprise integration — Best in KLAS two years running.</div></div>
  <div class="exec-item"><div class="exec-dot"></div><div class="exec-text"><strong>The real buyer is the CFO, not the clinician.</strong> Burnout reduction gets attention. Revenue cycle impact closes deals. Abridge is finally leaning into this — but not fast enough.</div></div>
  <div class="exec-item"><div class="exec-dot"></div><div class="exec-text"><strong>Biggest risk:</strong> Epic ships "Art for Clinicians" to 42% of US hospitals using its 300M-patient Cosmos dataset. Abridge's documentation moat commoditizes within 24 months if they don't expand the product surface.</div></div>
  <div class="exec-item"><div class="exec-dot"></div><div class="exec-text"><strong>The right move:</strong> Reposition from "AI scribe" to "conversational revenue engine." Prior auth, coding, billing — all at the point of conversation. The Availity partnership is the right bet. Execute faster.</div></div>
  <div class="exec-item"><div class="exec-dot"></div><div class="exec-text"><strong>Next frontier:</strong> Real-time clinical decision support during the visit. That's the $50B product. Documentation is just the wedge.</div></div>

    <div class="verdict-label">Verdict</div>
    <div class="verdict-text">Strong product. Must expand beyond scribing to survive long-term. The window is 18 months.</div>
  </div>
</div>

<!-- SECTION 1: PRODUCT -->
<div class="sec-kicker">Section 01 — The product</div>
<div class="sec-title">What Abridge actually does</div>

<div class="card">
  <div class="card-title">The core product</div>
  <div class="card-body">
    <span class="tag tf">FACT</span> Ambient AI scribe for enterprise health systems. Listens to clinician–patient conversations, generates a draft clinical note in real time, maps every sentence back to the exact audio that produced it (Linked Evidence), and routes structured data into Epic and 10+ other EHRs. Clinician signs off — Abridge never auto-submits.<sup>[1][2]</sup><br><br>
    <span class="tag tf">FACT</span> As of 2026, the platform has expanded to include real-time ICD-10/HCC coding suggestions, prior authorization, and billing-ready documentation — all at the point of conversation.<sup>[8]</sup>
  </div>
</div>

<div class="row2">
  <div class="card">
    <div class="card-title">Scale</div>
    <div class="card-body">
      200+ health systems.<sup>[1]</sup> 80M patient conversations projected in 2026.<sup>[1]</sup> Kaiser Permanente: 24,600 physicians across 40 hospitals — the largest generative AI deployment in healthcare.<sup>[2]</sup>
    </div>
  </div>
  <div class="card">
    <div class="card-title">The one feature that matters most</div>
    <div class="card-body">
      <span class="tag to">MY OPINION</span> Linked Evidence is the product. Every competitor generates notes. Only Abridge lets a clinician tap any sentence and hear the exact audio that produced it. This is the answer to "how do I know it's accurate?" — and it's why KLAS scores Abridge #1 two years running.<sup>[13]</sup>
    </div>
  </div>
</div>

<hr>

<!-- SECTION 2: USERS -->
<div class="sec-kicker">Section 02 — Users & market · JTBD lens (Aakash Gupta, aakashg.com)</div>
<div class="sec-title">Three jobs. Two buyers. One real decision-maker.</div>

<div class="stats">
  <div class="stat">
    <div class="stat-n">51.9%→38.8%</div>
    <div class="stat-l">Physician burnout rate before vs. after Abridge</div>
    <div class="stat-s">[9] Yale SOM, 263 physicians</div>
  </div>
  <div class="stat">
    <div class="stat-n">30 min</div>
    <div class="stat-l">Documentation time saved per clinician per day</div>
    <div class="stat-s">[10] UW Health RCT — strongest design</div>
  </div>
  <div class="stat">
    <div class="stat-n">$1.5T</div>
    <div class="stat-l">US healthcare administrative cost annually</div>
    <div class="stat-s">[6] Abridge Series E announcement</div>
  </div>
  <div class="stat">
    <div class="stat-n">$2,500</div>
    <div class="stat-l">Per clinician/year enterprise pricing</div>
    <div class="stat-s">[2] Sacra Research</div>
  </div>
</div>

<div class="box-w">
  <div class="box-w-lbl">Study quality — read carefully</div>
  <div class="box-w-text">Burnout figures come from observational studies (Yale: 30-day follow-up) and one pragmatic RCT (UW Health, 7 months — strongest design). Not double-blind RCTs. Use as directional evidence, not clinical proof.</div>
</div>

<div class="feat">
  <div class="feat-name">Job 1 — "Let me get home before 9pm"</div>
  <div class="feat-body"><span class="tag tf">FACT</span> 73% of clinicians in the JAMIA study reported less after-hours documentation time.<sup>[11]</sup> "Pajama time" — charting after hours — is the #1 cited driver of physician burnout. This is who Abridge sells to emotionally. But they don't write the check.</div>
</div>
<div class="feat">
  <div class="feat-name">Job 2 — "Stop the billing team from losing money on my notes"</div>
  <div class="feat-body"><span class="tag tf">FACT</span> Abridge now generates real-time ICD-10, HCC, and visit diagnosis codes during the conversation. The Availity partnership routes prior auth in real-time — reducing approval timelines from weeks to minutes.<sup>[4][5]</sup><br><br><span class="tag to">MY OPINION</span> This is the real product. Burnout reduction gets attention. Revenue cycle impact closes the deal. A CFO approving a $2,500/clinician/year contract doesn't care about pajama time — they care about billing accuracy and denied claims.</div>
</div>
<div class="feat">
  <div class="feat-name">Job 3 — "Be present with my patient again"</div>
  <div class="feat-body"><span class="tag tf">FACT</span> WVU Medicine: 78% increase in "undivided patient attention" across 2,800 clinicians.<sup>[5]</sup> <span class="tag tw">DATA GAP</span> Self-reported perception metric, not observed behavior. Use carefully in interviews.</div>
</div>

<hr>

<!-- SECTION 3: FEATURES -->
<div class="sec-kicker">Section 03 — Feature analysis · Kano-for-AI lens (Dr. Marily Nika, AI PM course 2024)</div>
<div class="sec-title">What they have. What's decaying. What's next.</div>

<div class="kano">
  <div class="kc b">
    <div class="kc-head">Basic needs</div>
    <div class="kc-sub">Absence = users leave</div>
    <div class="kc-item">Medical transcription accuracy</div>
    <div class="kc-item">Epic integration</div>
    <div class="kc-item">HIPAA compliance</div>
    <div class="kc-item">Clinician sign-off gate</div>
    <div class="kc-item">Mobile (iOS + Android)</div>
  </div>
  <div class="kc p">
    <div class="kc-head">Performance</div>
    <div class="kc-sub">More = higher satisfaction</div>
    <div class="kc-item">38s note generation (fastest) <sup>[7]</sup></div>
    <div class="kc-item">55+ specialties, 28 languages <sup>[6ref]</sup></div>
    <div class="kc-item">Best in KLAS 2025 + 2026 <sup>[13]</sup></div>
    <div class="kc-item">EHR breadth: athena, Cerner, eCW <sup>[12]</sup></div>
    <div class="kc-item">ICD-10 + HCC real-time coding <sup>[8]</sup></div>
  </div>
  <div class="kc d">
    <div class="kc-head">Delighters</div>
    <div class="kc-sub">Unexpected — drives word-of-mouth</div>
    <div class="kc-item">Linked Evidence: tap note → exact audio <sup>[5]</sup></div>
    <div class="kc-item">Note generated during (not after) visit <sup>[4]</sup></div>
    <div class="kc-item">Real-time prior auth at point of care <sup>[4]</sup></div>
  </div>
</div>

<div class="box-o">
  <div class="box-o-lbl">Kano decay risk — my take</div>
  <div class="box-o-text">Linked Evidence is a Delighter today. It becomes a Basic Need within 18 months as DAX and Ambience copy it. Abridge's roadmap must move upstream — real-time clinical decision support is the next Delighter. "The patient mentioned chest pain — consider ordering a troponin" is a fundamentally different product from a scribe. That's where the defensible moat lives.</div>
</div>

<hr>

<!-- SECTION 4: COMPETITION -->
<div class="sec-kicker">Section 04 — Competitive position</div>
<div class="sec-title">The real threat isn't DAX. It's Epic.</div>

<div class="row2">
  <div class="card">
    <div class="card-title">Microsoft Dragon Copilot (DAX)</div>
    <div class="card-body">
      <span class="tag tf">FACT</span> 33% market share vs Abridge's 30%.<sup>[14]</sup> An RCT across 238 physicians (UCLA, Nov 2024–Jan 2025) found DAX reduced documentation time but showed mixed burnout results.<sup>[15]</sup><br><br>
      <span class="tag to">MY OPINION</span> DAX wins via Azure procurement relationships, not product quality. Abridge beats them on every independent quality measure. The risk is enterprise IT teams bundling DAX with existing Microsoft contracts. That's a distribution problem, not a product problem.
    </div>
  </div>
  <div class="card">
    <div class="card-title">Ambience Healthcare</div>
    <div class="card-body">
      <span class="tag tf">FACT</span> $243M Series C (Jul 2025), $1.25B valuation. Backed by a16z, Kleiner Perkins, OpenAI Startup Fund. 100+ specialties vs Abridge's 55+. Includes native ICD-10/CPT coding.<sup>[8]</sup><br><br>
      <span class="tag to">MY OPINION</span> Ambience is the most dangerous direct competitor — not DAX. The OpenAI Startup Fund backing is a signal about model quality trajectory. Watch closely.
    </div>
  </div>
</div>

<div class="card" style="border-color:#e24b4a;border-width:1.5px">
  <div class="card-title" style="color:#a32d2d">The existential risk: Epic "Art for Clinicians"</div>
  <div class="card-body">
    <span class="tag tf">FACT</span> Epic launched its own ambient scribe at 2025 UGM. Epic serves 42% of US hospitals with a 300M-patient Cosmos dataset and a native EHR integration advantage no startup can replicate.<sup>[8]</sup><br><br>
    <span class="tag tw">DATA GAP</span> No independent outcome data on Art for Clinicians as of March 2026.<br><br>
    <span class="tag to">MY OPINION</span> Epic entering is not a risk to monitor — it's a timer. Abridge has 18–24 months before Epic's distribution advantage overwhelms any product quality gap. The Pal partnership that made Abridge is now Abridge's ceiling. They must build workflows Epic cannot own — cross-payer revenue cycle intelligence being the clearest candidate.
  </div>
</div>

<hr>

<!-- SECTION 5: 90-DAY PLAN -->
<div class="sec-kicker">Section 05 — Execution</div>
<div class="sec-title">If I were PM: first 90 days</div>

<div class="plan">
  <div class="plan-title">90-day PM plan — repositioning Abridge from scribe to revenue engine</div>

  <div class="plan-row">
    <div class="plan-month">Days 1–30</div>
    <div>
      <div class="plan-title2">Audit revenue cycle adoption gap</div>
      <div class="plan-body">Prior auth and ICD-10 coding features exist — but what % of deployed clinicians actually use them? Pull activation data by feature, health system, and specialty. My hypothesis: adoption of revenue cycle features is under 20% at existing accounts. That's the gap to close before selling to new ones.</div>
      <div class="plan-metric">Metric: revenue feature activation rate by account</div>
    </div>
  </div>

  <div class="plan-row">
    <div class="plan-month">Days 31–60</div>
    <div>
      <div class="plan-title2">Run a billing accuracy pilot with 2 health systems</div>
      <div class="plan-body">Identify 2 enterprise accounts with active finance teams. Instrument Abridge's ICD-10 suggestions vs baseline coding accuracy. Measure: claim denial rate, HCC capture rate, days-to-reimbursement. This generates the CFO-facing case study that every enterprise sales conversation needs but doesn't have yet.</div>
      <div class="plan-metric">Metric: claim denial rate reduction %, days-to-reimbursement delta</div>
    </div>
  </div>

  <div class="plan-row">
    <div class="plan-month">Days 61–90</div>
    <div>
      <div class="plan-title2">Reposition one sales motion: "scribe" → "revenue engine"</div>
      <div class="plan-body">Use pilot data to build a CFO-ready ROI calculator. Reframe the AE pitch: lead with billing lift and denied claims recovered, not clinician burnout. Burnout gets you a CMO meeting. Revenue cycle gets you a signed contract. Test in 3 enterprise deals — measure win rate vs. control group of "burnout-first" pitches.</div>
      <div class="plan-metric">Metric: deal win rate (new pitch vs. control)</div>
    </div>
  </div>
</div>

<hr>

<!-- SECTION 6: KEY GAPS -->
<div class="sec-kicker">Section 06 — Gaps</div>
<div class="sec-title">What's missing</div>

<div class="feat">
  <div class="feat-name"><span class="tag to">MY OPINION</span> &nbsp;No small practice product</div>
  <div class="feat-body">Burnout is worst in independent practices. Abridge has no self-serve or sub-enterprise tier. The athenahealth partnership is the right distribution bet — but there's no product designed for a solo internist. Freemium with a usage cap would create a bottom-up enterprise motion and collect diversity of specialty data.</div>
</div>
<div class="feat">
  <div class="feat-name"><span class="tag to">MY OPINION</span> &nbsp;No real-time clinical decision support</div>
  <div class="feat-body">Abridge listens and documents. It doesn't yet say "patient mentioned chest tightness — consider troponin." That feature is regulatory-complex (510(k) territory) but it's the leap from $5B to $50B. Every year they wait, a better-funded competitor files first.</div>
</div>
<div class="feat">
  <div class="feat-name"><span class="tag ti">INFERENCE</span> &nbsp;Epic dependency is a strategic ceiling</div>
  <div class="feat-body">The "first Pal" partnership gave Abridge its distribution. It also means Epic can change the terms. Deep Cerner and eClinicalWorks integration is the de-risking move — and it's happening too slowly.<sup>[8]</sup></div>
</div>
